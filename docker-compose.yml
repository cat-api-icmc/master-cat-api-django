services:
  django-api:
    build: .
    image: brunosilvestre00/django-cat-api
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      plumber-api:
        condition: service_started
    networks:
      - cat-api

